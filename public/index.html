<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMC Alliance — Subscription Tracker</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
</head>
<body>
  <div class="dash">
    <div class="top-bar">
      <h1>
        <span class="logo-dot"><i class="ti ti-chart-bar"></i></span>
        CMC Alliance — Subscription Tracker
      </h1>
      <div class="sync-row">
        <span class="sync-status loading" id="sync-status"><i class="ti ti-refresh"></i> Syncing...</span>
        <button class="btn" onclick="loadFromSheets()" title="Refresh from sheet"><i class="ti ti-refresh"></i></button>
        <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle dark mode"><i class="ti ti-moon"></i></button>
        <button class="btn primary" onclick="openAdd()"><i class="ti ti-plus"></i> Add subscriber</button>
      </div>
    </div>

    <div id="error-area"></div>

    <!-- Combined overview + renewals panel -->
    <div class="overview-panel" id="overview-panel">
      <div class="overview-stats" id="cards">
        <!-- populated by JS -->
      </div>
      <div class="overview-renewals">
        <div class="overview-renewals-label">Upcoming renewals · next 60 days</div>
        <div class="renewals-bar" id="renewals-bar"></div>
      </div>
    </div>

    <div class="filters">
      <input type="text" id="search" placeholder="Search exchange..." oninput="render()" />
      <select id="f-status" onchange="render()">
        <option value="">All statuses</option>
        <option>Active</option><option>Pending</option><option>Paused</option>
      </select>
      <select id="f-tier" onchange="render()">
        <option value="">All tiers</option>
        <option>Gold</option><option>Silver</option><option>Bronze</option>
      </select>
      <select id="f-term" onchange="render()">
        <option value="">Monthly & Yearly</option>
        <option>Monthly</option><option>Yearly</option>
      </select>
      <select id="f-type" onchange="render()">
        <option value="">CEX & DEX</option>
        <option>CEX</option><option>DEX</option>
      </select>
      <button class="btn" onclick="clearFilters()"><i class="ti ti-refresh"></i> Reset</button>
    </div>

    <div class="count-bar" id="count-bar"></div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th onclick="sortBy('name')">Exchange <span class="sort-arrow" id="s-name"></span></th>
            <th onclick="sortBy('type')">Type <span class="sort-arrow" id="s-type"></span></th>
            <th onclick="sortBy('tier')">Tier <span class="sort-arrow" id="s-tier"></span></th>
            <th onclick="sortBy('term')">Term <span class="sort-arrow" id="s-term"></span></th>
            <th onclick="sortBy('renewal')">Current Cycle <span class="sort-arrow" id="s-renewal"></span></th>
            <th onclick="sortBy('due')">Due Date <span class="sort-arrow" id="s-due"></span></th>
            <th onclick="sortBy('status')">Status <span class="sort-arrow" id="s-status"></span></th>
            <th>Contract</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="9" class="loading-state"><i class="ti ti-loader"></i> Loading from Google Sheets...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div id="modal-bg" class="modal-bg" style="display:none" onclick="if(event.target===this)closeModal()">
    <div class="modal" id="modal-box"></div>
  </div>

  <script src="app.js"></script>
  <script>
    function applyTheme(dark) {
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : '');
      document.getElementById('theme-btn').innerHTML = dark
        ? '<i class="ti ti-sun"></i>'
        : '<i class="ti ti-moon"></i>';
      localStorage.setItem('cmca-theme', dark ? 'dark' : 'light');
    }
    function toggleTheme() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      applyTheme(!isDark);
    }
    const saved = localStorage.getItem('cmca-theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    applyTheme(saved ? saved === 'dark' : prefersDark);
  </script>
</body>
</html>
